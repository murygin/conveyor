info:
  name: Get job result
  type: http
  seq: 2

http:
  method: GET
  url: http://{{server}}/jobs/:id
  params:
    - name: id
      value: "{{jobId}}"
      type: path
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return success", function () {
          expect(res.getStatus()).to.equal(200);
        });
        test("should return job data", function () {
          const body = res.getBody();
          expect(body).to.have.property("state");
          expect(body).to.have.property("id");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
